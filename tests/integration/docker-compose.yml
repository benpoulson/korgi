# Integration test environment: 2 simulated hosts with Docker + SSH
#
# Usage:
#   cd tests/integration
#   ./setup.sh        # generate SSH keys, start hosts
#   ./run_tests.sh    # run korgi against the hosts
#   ./teardown.sh     # stop and clean up

services:
  host-a:
    build:
      context: .
      dockerfile: Dockerfile.host
    privileged: true
    hostname: host-a
    ports:
      - "2201:22"
    volumes:
      - ./test_key.pub:/root/.ssh/authorized_keys:ro
    networks:
      korgi-test:
        ipv4_address: 172.28.0.10

  host-b:
    build:
      context: .
      dockerfile: Dockerfile.host
    privileged: true
    hostname: host-b
    ports:
      - "2202:22"
    volumes:
      - ./test_key.pub:/root/.ssh/authorized_keys:ro
    networks:
      korgi-test:
        ipv4_address: 172.28.0.11

networks:
  korgi-test:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
